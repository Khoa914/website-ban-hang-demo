  <main class="auth-container">
    <h2>Đăng ký tài khoản</h2>
    
    <form id="register-form" class="auth-form" action="dang-ky.php" method="POST">
      <div id="auth-message"></div>

      <div class="form-group">
        <label for="ho_ten">Họ tên</label>
        <input type="text" id="ho_ten" name="ho_ten" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="so_dien_thoai">Số điện thoại</label>
        <input type="tel" id="so_dien_thoai" name="so_dien_thoai" required>
      </div>
      <div class="form-group">
        <label for="dia_chi">Địa chỉ giao hàng</label>
        <input type="text" id="dia_chi" name="dia_chi" required>
      </div>
      
      <div class="form-group">
        <label for="mat_khau">Mật khẩu (ít nhất 6 ký tự)</label>
        <input type="password" id="mat_khau" name="mat_khau" required minlength="6">
      </div>
      <div class="form-group">
        <label for="xac_nhan_mat_khau">Xác nhận mật khẩu</label>
        <input type="password" id="xac_nhan_mat_khau" name="xac_nhan_mat_khau" required>
      </div>
      <button type="submit">Đăng ký</button>
    </form>
    
    <div class="switch-link">
      <p>Bạn đã có tài khoản? <a href="dang-nhap.html">Đăng nhập ngay</a></p>
    </div>
